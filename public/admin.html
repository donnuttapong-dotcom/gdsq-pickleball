<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDSQ Pickleball - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { gdsq: '#0044CC', gdsqRed: '#E32636' } } } }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-900">
    <div class="mx-auto min-h-screen max-w-6xl px-4 py-6" x-data="adminDashboard()" x-init="init()">
        <div class="mb-6 flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
            <div>
                <p class="text-xs font-bold uppercase tracking-wide text-gdsq">GDSQ Pickleball</p>
                <h1 class="text-3xl font-black">RSVP Admin</h1>
                <p class="mt-1 text-sm text-gray-500">ดูรายชื่อผู้เล่น Joined และ Waitlist จาก Supabase แบบ real-time</p>
            </div>
            <div class="flex gap-2">
                <a href="/" class="rounded-lg border border-gray-300 bg-white px-4 py-2 text-sm font-bold hover:bg-gray-50">
                    <i class="fa-solid fa-mobile-screen-button mr-2"></i>Event page
                </a>
                <button class="rounded-lg bg-gdsq px-4 py-2 text-sm font-bold text-white hover:bg-blue-800" @click="loadAll()">
                    <i class="fa-solid fa-rotate mr-2"></i>Refresh
                </button>
            </div>
        </div>

        <div class="mb-5 grid gap-3 md:grid-cols-[1fr_auto]">
            <div class="rounded-lg bg-white p-4 shadow-sm">
                <label class="mb-2 block text-xs font-bold uppercase text-gray-500">Event</label>
                <select
                    class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm"
                    x-model="selectedSessionId"
                    @change="loadRsvps()"
                >
                    <template x-for="session in sessions" :key="session.id">
                        <option :value="session.id" x-text="`${session.index}. ${session.title}`"></option>
                    </template>
                </select>
            </div>

            <div class="rounded-lg bg-white p-4 shadow-sm">
                <label class="mb-2 block text-xs font-bold uppercase text-gray-500">Export</label>
                <a
                    class="inline-flex w-full items-center justify-center rounded-lg bg-gray-900 px-4 py-2 text-sm font-bold text-white hover:bg-black"
                    :href="selectedSessionId ? `/api/session/${selectedSessionId}/export.csv` : '#'"
                >
                    <i class="fa-solid fa-file-csv mr-2"></i>Download CSV
                </a>
            </div>
        </div>

        <div class="mb-5 rounded-lg bg-white p-4 shadow-sm">
            <label class="mb-2 block text-xs font-bold uppercase text-gray-500">Selected Event Link</label>
            <div class="flex flex-col gap-2 sm:flex-row">
                <input
                    class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm"
                    type="text"
                    readonly
                    :value="selectedSessionId ? `${window.location.origin}/?sessionId=${selectedSessionId}` : ''"
                >
                <a
                    class="inline-flex items-center justify-center rounded-lg border border-gray-300 bg-white px-4 py-2 text-sm font-bold hover:bg-gray-50"
                    :href="selectedSessionId ? `/?sessionId=${selectedSessionId}` : '#'"
                >
                    <i class="fa-solid fa-arrow-up-right-from-square mr-2"></i>Open
                </a>
            </div>
        </div>

        <div class="mb-5 grid gap-3 sm:grid-cols-4">
            <div class="rounded-lg bg-white p-4 shadow-sm">
                <p class="text-xs font-bold uppercase text-gray-500">Joined</p>
                <p class="mt-1 text-3xl font-black text-gdsq" x-text="summary.joinedCount">0</p>
            </div>
            <div class="rounded-lg bg-white p-4 shadow-sm">
                <p class="text-xs font-bold uppercase text-gray-500">Waitlist</p>
                <p class="mt-1 text-3xl font-black text-gdsqRed" x-text="summary.waitlistCount">0</p>
            </div>
            <div class="rounded-lg bg-white p-4 shadow-sm">
                <p class="text-xs font-bold uppercase text-gray-500">Spots Left</p>
                <p class="mt-1 text-3xl font-black" x-text="summary.spotsLeft">0</p>
            </div>
            <div class="rounded-lg bg-white p-4 shadow-sm">
                <p class="text-xs font-bold uppercase text-gray-500">Capacity</p>
                <p class="mt-1 text-3xl font-black" x-text="summary.maxPlayers">0</p>
            </div>
        </div>

        <div class="mb-5 rounded-lg bg-white p-4 shadow-sm">
            <div class="mb-3 flex items-center justify-between">
                <h2 class="text-lg font-black">Create Event</h2>
                <p class="text-xs font-semibold text-gray-500" x-text="formMessage"></p>
            </div>
            <div class="grid gap-3 md:grid-cols-[1fr_140px_auto]">
                <input
                    class="rounded-lg border border-gray-300 px-3 py-2 text-sm"
                    type="text"
                    placeholder="Event title"
                    x-model="newSession.title"
                >
                <input
                    class="rounded-lg border border-gray-300 px-3 py-2 text-sm"
                    type="number"
                    min="1"
                    placeholder="Max players"
                    x-model="newSession.maxPlayers"
                >
                <button
                    class="rounded-lg bg-gdsq px-4 py-2 text-sm font-bold text-white hover:bg-blue-800 disabled:opacity-50"
                    @click="createSession()"
                    :disabled="isLoading"
                >
                    <i class="fa-solid fa-plus mr-2"></i>Create
                </button>
            </div>
        </div>

        <div class="grid gap-5 lg:grid-cols-2">
            <section class="rounded-lg bg-white shadow-sm">
                <div class="border-b px-4 py-3">
                    <h2 class="font-black">Joined</h2>
                </div>
                <div class="divide-y">
                    <template x-for="rsvp in joinedRsvps" :key="rsvp.id">
                        <div class="flex items-center justify-between px-4 py-3">
                            <div>
                                <p class="font-bold" x-text="rsvp.user.display_name"></p>
                                <p class="text-xs text-gray-500" x-text="formatDate(rsvp.createdAt)"></p>
                            </div>
                            <span class="rounded-full bg-green-50 px-3 py-1 text-xs font-bold text-green-700">Joined</span>
                        </div>
                    </template>
                    <p class="px-4 py-6 text-center text-sm text-gray-500" x-show="joinedRsvps.length === 0">ยังไม่มีคน Joined</p>
                </div>
            </section>

            <section class="rounded-lg bg-white shadow-sm">
                <div class="border-b px-4 py-3">
                    <h2 class="font-black">Waitlist</h2>
                </div>
                <div class="divide-y">
                    <template x-for="rsvp in waitlistRsvps" :key="rsvp.id">
                        <div class="flex items-center justify-between px-4 py-3">
                            <div>
                                <p class="font-bold" x-text="rsvp.user.display_name"></p>
                                <p class="text-xs text-gray-500" x-text="formatDate(rsvp.createdAt)"></p>
                            </div>
                            <span class="rounded-full bg-red-50 px-3 py-1 text-xs font-bold text-gdsqRed">Waitlist</span>
                        </div>
                    </template>
                    <p class="px-4 py-6 text-center text-sm text-gray-500" x-show="waitlistRsvps.length === 0">ยังไม่มี Waitlist</p>
                </div>
            </section>
        </div>

        <div class="mt-5 rounded-lg bg-red-50 p-3 text-sm font-semibold text-red-700" x-show="errorMessage" x-text="errorMessage"></div>
    </div>

    <script>
        function adminDashboard() {
            return {
                sessions: [],
                selectedSessionId: '',
                rsvps: [],
                summary: {
                    joinedCount: 0,
                    waitlistCount: 0,
                    spotsLeft: 0,
                    maxPlayers: 0
                },
                newSession: {
                    title: '',
                    maxPlayers: 24
                },
                formMessage: '',
                errorMessage: '',
                isLoading: false,

                get joinedRsvps() {
                    return this.rsvps.filter((rsvp) => rsvp.status === 'Joined');
                },

                get waitlistRsvps() {
                    return this.rsvps.filter((rsvp) => rsvp.status === 'Waitlist');
                },

                async init() {
                    await this.loadAll();
                },

                async loadAll() {
                    this.errorMessage = '';
                    await this.loadSessions();
                    if (this.selectedSessionId) {
                        await this.loadRsvps();
                    }
                },

                async loadSessions() {
                    const response = await fetch('/api/sessions');
                    const result = await response.json();

                    if (!response.ok) {
                        this.errorMessage = result.message || 'โหลด event ไม่สำเร็จ';
                        return;
                    }

                    this.sessions = result.sessions;
                    if (!this.selectedSessionId && this.sessions.length > 0) {
                        this.selectedSessionId = this.sessions[0].id;
                    }
                    this.syncSummary();
                },

                async loadRsvps() {
                    if (!this.selectedSessionId) return;

                    const response = await fetch(`/api/session/${this.selectedSessionId}/rsvps`);
                    const result = await response.json();

                    if (!response.ok) {
                        this.errorMessage = result.message || 'โหลด RSVP ไม่สำเร็จ';
                        return;
                    }

                    this.rsvps = result.rsvps;
                    this.syncSummary();
                },

                async createSession() {
                    this.isLoading = true;
                    this.formMessage = '';
                    this.errorMessage = '';

                    try {
                        const response = await fetch('/api/sessions', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(this.newSession)
                        });
                        const result = await response.json();

                        if (!response.ok) {
                            throw new Error(result.message || 'สร้าง event ไม่สำเร็จ');
                        }

                        this.formMessage = 'สร้าง event แล้ว';
                        this.newSession.title = '';
                        this.newSession.maxPlayers = 24;
                        this.selectedSessionId = result.session.id;
                        await this.loadAll();
                    } catch (error) {
                        this.errorMessage = error.message;
                    } finally {
                        this.isLoading = false;
                    }
                },

                syncSummary() {
                    const session = this.sessions.find((item) => item.id === this.selectedSessionId);
                    if (!session) return;

                    this.summary = {
                        joinedCount: session.joinedCount,
                        waitlistCount: session.waitlistCount,
                        spotsLeft: session.spotsLeft,
                        maxPlayers: session.maxPlayers
                    };
                },

                formatDate(value) {
                    if (!value) return '';
                    return new Intl.DateTimeFormat('th-TH', {
                        dateStyle: 'medium',
                        timeStyle: 'short'
                    }).format(new Date(value));
                }
            };
        }
    </script>
</body>
</html>
